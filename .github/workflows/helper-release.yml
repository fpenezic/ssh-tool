# Helper release workflow. Sidecar tunnel helpers (NetBird today,
# Tailscale next) ship on their OWN tag namespace - "helper-vN" - so
# they evolve on a cadence decoupled from the app version. The app pulls
# the newest helper-v<=maxProtocol release (see app_plugins.go +
# docs/helper-release-plan.md).
#
# Triggered by a helper-vN tag. Builds every helper for every platform
# and publishes them to a single GitHub release named after the tag.
# The app-release workflow (release.yml) no longer builds helpers.
name: helper-release

on:
  push:
    tags:
      - "helper-v[0-9]+"

permissions:
  contents: write # gh release create

jobs:
  # One matrix per (provider x platform). netbird needs CGO on Windows
  # (a plain CGO_ENABLED=0 cross build misbehaves - builds a real wt0
  # adapter instead of userspace), cross-compiled with Zig as the C
  # toolchain. Linux builds native per arch. Asset names stay
  # ssh-tool-<provider>-<os>-<arch>[.exe] so the app finds them by
  # platform. Version stamp = the helper tag (NOT the app version).
  build-helpers:
    strategy:
      fail-fast: false
      matrix:
        include:
          - provider: netbird
            dir: netbird-helper
            platform: linux-amd64
            runner: ubuntu-24.04
            goos: linux
            goarch: amd64
            cgo: "1"
            cc: ""
            out: ssh-tool-netbird-linux-amd64
          - provider: netbird
            dir: netbird-helper
            platform: linux-arm64
            runner: ubuntu-24.04-arm
            goos: linux
            goarch: arm64
            cgo: "1"
            cc: ""
            out: ssh-tool-netbird-linux-arm64
          - provider: netbird
            dir: netbird-helper
            platform: windows-amd64
            runner: ubuntu-24.04
            goos: windows
            goarch: amd64
            cgo: "1"
            cc: zig-windows-amd64
            out: ssh-tool-netbird-windows-amd64.exe
          # Tailscale (tsnet) is pure Go - no CGO, no wireguard-go fork -
          # so it cross-compiles cleanly with CGO_ENABLED=0 and needs no
          # Zig toolchain. cgo: "0" per leg drives that below.
          - provider: tailscale
            dir: tailscale-helper
            platform: linux-amd64
            runner: ubuntu-24.04
            goos: linux
            goarch: amd64
            cgo: "0"
            cc: ""
            out: ssh-tool-tailscale-linux-amd64
          - provider: tailscale
            dir: tailscale-helper
            platform: linux-arm64
            runner: ubuntu-24.04
            goos: linux
            goarch: arm64
            cgo: "0"
            cc: ""
            out: ssh-tool-tailscale-linux-arm64
          - provider: tailscale
            dir: tailscale-helper
            platform: windows-amd64
            runner: ubuntu-24.04
            goos: windows
            goarch: amd64
            cgo: "0"
            cc: ""
            out: ssh-tool-tailscale-windows-amd64.exe
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version-file: ${{ matrix.dir }}/go.mod
      - name: Install Zig (for Windows cross CGO)
        if: ${{ matrix.goos == 'windows' && matrix.cgo == '1' }}
        run: |
          ZIG_VERSION=0.14.0
          curl -fsSL "https://ziglang.org/download/${ZIG_VERSION}/zig-linux-x86_64-${ZIG_VERSION}.tar.xz" \
            | sudo tar -xJ -C /opt
          sudo ln -sf /opt/zig-linux-x86_64-${ZIG_VERSION}/zig /usr/local/bin/zig
          printf '#!/bin/sh\nexec zig cc -target x86_64-windows-gnu -fno-sanitize=all "$@"\n' \
            | sudo tee /usr/local/bin/zig-windows-amd64 >/dev/null
          sudo chmod +x /usr/local/bin/zig-windows-amd64
      - name: Build helper
        working-directory: ${{ matrix.dir }}
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: ${{ matrix.cgo }}
          CC: ${{ matrix.cc }}
        run: |
          # Stamp the helper tag (helper-vN) as the helper version, so the
          # app's update check compares against the helper release, not the
          # app.
          ver="${{ github.ref_name }}"
          # Also stamp the embedded NetBird library's own version var so the
          # NetBird management console reports the real client version
          # (e.g. 0.73.2) instead of "development". The value comes from the
          # netbird module pin in go.mod, so it always matches what the embed
          # actually runs - no manual sync. netbird-helper only (Tailscale's
          # tsnet reports its own version fine).
          nbver=""
          if [ "${{ matrix.dir }}" = "netbird-helper" ]; then
            nbver="$(go list -m -f '{{.Version}}' github.com/netbirdio/netbird | sed 's/^v//')"
          fi
          nbflag=""
          if [ -n "$nbver" ]; then
            nbflag="-X github.com/netbirdio/netbird/version.version=${nbver}"
          fi
          go build -trimpath -ldflags="-w -s -X main.version=${ver} ${nbflag}" \
            -o "../bin/${{ matrix.out }}" .
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.out }}
          path: bin/${{ matrix.out }}
          if-no-files-found: error
          retention-days: 7

  publish:
    needs: [build-helpers]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: bin
          merge-multiple: true
      - name: GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${{ github.ref_name }}"
          # Idempotent: a re-run uploads into the existing release rather
          # than failing on create.
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" bin/* --clobber
          else
            gh release create "$tag" bin/* \
              --title "$tag" \
              --notes "Sidecar tunnel helpers (NetBird, Tailscale). Downloaded automatically by ssh-tool; see Settings > Network profiles > Plugins."
          fi
