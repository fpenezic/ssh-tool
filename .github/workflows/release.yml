# Release pipeline for ssh-tool (port of the pre-OSS GitLab CI).
#
# Trigger: annotated semver tags. Plain tags (v0.45.2) run
# test -> build x4 + android -> publish (GitHub Release; sshtool.app
# mirrors it within ~10 minutes and redirects downloads to the
# release assets). Suffixed tags (-test, -rcN) land as a GitHub
# *prerelease* only and are never offered as updates.
#
# Differences from the GitLab pipeline:
# - No custom CI image: hosted runners apt-get the GTK/WebKit deps
#   per job (~1 min) and setup-go/setup-node handle tool caches.
# - linux-arm64 builds natively on the ubuntu-24.04-arm hosted
#   runner (observed working on this repo while still private).
# - Pre-release artifacts go to a GitHub prerelease instead of the
#   GitLab Generic Package Registry.
#
# Secrets: ANDROID_DEBUG_KEYSTORE (APK signing, see build-android).

name: release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-*"

permissions:
  contents: write # gh release create

env:
  WAILS3_VERSION: v3.0.0-alpha2.111

jobs:
  test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history + tags so `git describe` stamps the version.
          fetch-depth: 0
      - name: Install Wails v3 Linux deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential pkg-config \
            libgtk-4-dev libwebkitgtk-6.0-dev \
            libgtk-3-dev libwebkit2gtk-4.1-dev
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      # The root `main` package embeds frontend/dist (//go:embed), so the
      # frontend has to be built before `go test .` can compile - hence
      # the frontend build up front (which also feeds npm run check).
      - name: Frontend build + svelte-check
        working-directory: frontend
        run: |
          npm ci
          npm run build
          npm run check
      # go vet is intentionally NOT a gate here: it currently flags some
      # pre-existing %s:%d-vs-IPv6 formatting in the ssh layer that's a
      # separate cleanup. The real gates are the test suite + svelte-check.
      # Scope: ./internal/... + root main - build/{android,ios} scaffold
      # packages don't compile without the NDK/Xcode.
      - name: Go tests
        run: go test ./internal/... .

  build:
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux-amd64
            runner: ubuntu-24.04
            build: task linux:build
            bin: bin/ssh-tool
            out: ssh-tool-linux-amd64
          - platform: linux-arm64
            runner: ubuntu-24.04-arm
            build: task linux:build
            bin: bin/ssh-tool
            out: ssh-tool-linux-arm64
          # Windows targets cross-compile from linux with CGO_ENABLED=0.
          # Wails v3 on Windows talks to WebView2 via a system DLL - no
          # C compiler dep at build time, so no GTK deps either.
          - platform: windows-amd64
            runner: ubuntu-24.04
            build: CGO_ENABLED=0 task windows:build
            bin: bin/ssh-tool.exe
            out: ssh-tool-windows-amd64.exe
          - platform: windows-arm64
            runner: ubuntu-24.04
            build: CGO_ENABLED=0 task windows:build ARCH=arm64
            bin: bin/ssh-tool.exe
            out: ssh-tool-windows-arm64.exe
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      # Needed on the windows cross legs too: `go install wails3`
      # links the CLI against the full wails runtime, which needs the
      # GTK/WebKit shared libs even though the windows build itself
      # is CGO_ENABLED=0.
      - name: Install Wails v3 Linux deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential pkg-config \
            libgtk-4-dev libwebkitgtk-6.0-dev \
            libgtk-3-dev libwebkit2gtk-4.1-dev
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install task + wails3 CLI
        run: |
          go install github.com/go-task/task/v3/cmd/task@latest
          go install github.com/wailsapp/wails/v3/cmd/wails3@${WAILS3_VERSION}
      - name: Frontend deps
        working-directory: frontend
        run: npm ci
      - name: Build
        # SSHTOOL_VERSION pins the stamped version to the EXACT tag that
        # triggered this run. `git describe` is ambiguous when a commit
        # has more than one tag (a leftover -rcN next to the release
        # tag) and picked the wrong one in v0.48.0. The Taskfiles prefer
        # this env when set.
        env:
          SSHTOOL_VERSION: ${{ github.ref_name }}
        run: |
          ${{ matrix.build }}
          mv ${{ matrix.bin }} bin/${{ matrix.out }}
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.out }}
          path: bin/${{ matrix.out }}
          if-no-files-found: error
          retention-days: 7

  # Android APK. Built on the hosted runner (SDK preinstalled, NDK
  # added via sdkmanager) and signed with the same keystore local
  # builds used (ANDROID_DEBUG_KEYSTORE secret, base64) - a different
  # signing identity would make existing installs refuse the upgrade.
  # Clean version stamp per the bindings-regen gotcha: full
  # android:package once, restore the desktop bindings, then a
  # gradle-only re-assemble with the version passed explicitly.
  build-android:
    needs: test
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install Wails v3 Linux deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential pkg-config \
            libgtk-4-dev libwebkitgtk-6.0-dev \
            libgtk-3-dev libwebkit2gtk-4.1-dev
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - name: Install NDK r26d
        run: echo y | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" "ndk;26.3.11579264" >/dev/null
      - name: Install task + wails3 CLI
        run: |
          go install github.com/go-task/task/v3/cmd/task@latest
          go install github.com/wailsapp/wails/v3/cmd/wails3@${WAILS3_VERSION}
      - name: Restore signing keystore
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_DEBUG_KEYSTORE }}
        run: |
          if [ -z "$KEYSTORE_B64" ]; then
            echo "::error::ANDROID_DEBUG_KEYSTORE secret not set - APK would get a throwaway signature and existing installs would refuse to upgrade"
            exit 1
          fi
          echo "$KEYSTORE_B64" | base64 -d > "$RUNNER_TEMP/debug.keystore"
          # Explicit path consumed by the signingConfig in build.gradle;
          # the AGP default (.android dir) is relocated on hosted runners
          # and silently falls back to a fresh throwaway key.
          echo "SSHTOOL_KEYSTORE=$RUNNER_TEMP/debug.keystore" >> "$GITHUB_ENV"
      - name: Frontend deps
        working-directory: frontend
        run: npm ci
      - name: Build APK
        env:
          SSHTOOL_VERSION: ${{ github.ref_name }}
        run: |
          export ANDROID_NDK_HOME="$ANDROID_HOME/ndk/26.3.11579264"
          task android:package
          # The mid-build bindings regen dirties the tree and taints the
          # gradle version stamp; restore and re-assemble clean with the
          # version derived from the tag.
          git checkout -- frontend/bindings/
          tag="${{ github.ref_name }}"
          ver="${tag#v}"
          base="${ver%%-*}"
          IFS=. read -r MA MI PA <<< "$base"
          code=$((MA * 100000 + MI * 1000 + PA))
          (cd build/android && ./gradlew assembleDebug -PversionName="$ver" -PversionCode="$code")
          mkdir -p bin
          cp build/android/app/build/outputs/apk/debug/app-debug.apk bin/ssh-tool-android-arm64.apk
      - name: Verify APK signature
        run: |
          APKSIGNER=$(ls "$ANDROID_HOME"/build-tools/*/apksigner | tail -1)
          got=$("$APKSIGNER" verify --print-certs bin/ssh-tool-android-arm64.apk \
            | grep -oE 'SHA-256 digest: [a-f0-9]+' | head -1 | awk '{print $3}')
          exp="b2ca1fafc2e6fedbd9df84085ea0adb58d126263b2b43087f2bbba07f3b63349"
          if [ "$got" != "$exp" ]; then
            echo "::error::APK signed with the wrong key ($got) - existing installs would refuse this upgrade"
            exit 1
          fi
          echo "signature OK ($got)"
      - uses: actions/upload-artifact@v4
        with:
          name: ssh-tool-android-arm64.apk
          path: bin/ssh-tool-android-arm64.apk
          if-no-files-found: error
          retention-days: 7

  # Sidecar plugin binaries (NetBird). Separate Go module under
  # netbird-helper/ so its heavy replace set (wireguard-go fork etc.)
  # never touches the main app. Named ssh-tool-netbird-<os>-<arch>[.exe]
  # so app.go's PluginDownload can find them by platform. Version is
  # stamped from the tag so the app can tell an installed helper is a
  # release behind (PluginsStatus).
  #
  # netbird needs CGO on Windows (a plain CGO_ENABLED=0 cross-compile
  # misbehaves - it builds a real wt0 adapter instead of userspace).
  # Linux builds native per arch (host CC); Windows cross-compiles with
  # Zig as the C toolchain (`zig cc -target x86_64-windows-gnu`), which
  # is what the local build that first got NetBird working on Windows
  # used - do not swap it for a bare mingw without re-testing.
  build-helpers:
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux-amd64
            runner: ubuntu-24.04
            goos: linux
            goarch: amd64
            cc: ""
            out: ssh-tool-netbird-linux-amd64
          - platform: linux-arm64
            runner: ubuntu-24.04-arm
            goos: linux
            goarch: arm64
            cc: ""
            out: ssh-tool-netbird-linux-arm64
          - platform: windows-amd64
            runner: ubuntu-24.04
            goos: windows
            goarch: amd64
            cc: zig-windows-amd64
            out: ssh-tool-netbird-windows-amd64.exe
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version-file: netbird-helper/go.mod
      - name: Install Zig (for Windows cross CGO)
        if: ${{ matrix.goos == 'windows' }}
        run: |
          ZIG_VERSION=0.14.0
          curl -fsSL "https://ziglang.org/download/${ZIG_VERSION}/zig-linux-x86_64-${ZIG_VERSION}.tar.xz" \
            | sudo tar -xJ -C /opt
          sudo ln -sf /opt/zig-linux-x86_64-${ZIG_VERSION}/zig /usr/local/bin/zig
          # thin wrapper: `zig cc -target ...` as a single CC value
          printf '#!/bin/sh\nexec zig cc -target x86_64-windows-gnu -fno-sanitize=all "$@"\n' \
            | sudo tee /usr/local/bin/zig-windows-amd64 >/dev/null
          sudo chmod +x /usr/local/bin/zig-windows-amd64
      - name: Build helper
        working-directory: netbird-helper
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "1"
          CC: ${{ matrix.cc }}
        run: |
          ver="${{ github.ref_name }}"
          go build -trimpath -ldflags="-w -s -X main.version=${ver}" \
            -o "../bin/${{ matrix.out }}" .
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.out }}
          path: bin/${{ matrix.out }}
          if-no-files-found: error
          retention-days: 7

  # Full release: plain semver tags only. Creates the GitHub Release;
  # sshtool.app mirrors it (metadata sync + download redirect), which
  # is how pre-0.45 installs polling only sshtool.app still see it.
  publish:
    needs: [build, build-android, build-helpers]
    if: ${{ !contains(github.ref_name, '-') }}
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: bin
          merge-multiple: true
      - name: GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${{ github.ref_name }}"
          # Release notes = this tag's CHANGELOG block (between its
          # heading and the next "## [" heading). CHANGELOG headings
          # carry no "v" prefix ("## [0.44.0] - ..."), so match both
          # forms. Fall back to auto-generated notes when missing.
          ver="${tag#v}"
          awk -v ver="$ver" '
            $0 ~ "^## \\[v?" ver "\\]" { on=1; next }
            on && /^## \[/ { exit }
            on { print }
          ' CHANGELOG.md > /tmp/notes.md
          # Idempotent: a re-run (or a re-triggered tag) uploads assets
          # into the existing release instead of failing on create.
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" bin/* --clobber
          elif [ -s /tmp/notes.md ]; then
            gh release create "$tag" bin/* --title "$tag" --notes-file /tmp/notes.md
          else
            gh release create "$tag" bin/* --title "$tag" --generate-notes
          fi

  # Pre-release tags (vX.Y.Z-suffix): artifacts land as a GitHub
  # prerelease for testers; sshtool.app is never touched.
  prerelease:
    needs: [build, build-android, build-helpers]
    if: ${{ contains(github.ref_name, '-') }}
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: bin
          merge-multiple: true
      - name: GitHub prerelease
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${{ github.ref_name }}"
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" bin/* --clobber
          else
            gh release create "$tag" bin/* --title "$tag" --prerelease \
              --notes "Pre-release build for testing. Not published to sshtool.app."
          fi
